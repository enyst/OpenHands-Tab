name: E2E-UI (VS Code Desktop)

on:
  pull_request:
    branches: [ develop ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ develop ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  e2e-ui:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Update apt cache
        run: sudo apt-get update -y

      - name: Install base VS Code desktop dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -o Acquire::Retries=3 update -y
          sudo apt-get -o Acquire::Retries=3 install -y --no-install-recommends \
            libgtk-3-0 libnss3 libnspr4 libasound2 libxss1 libxkbfile1 libsecret-1-0 \
            libx11-6 libx11-xcb1 libxshmfence1 libgbm1 libglib2.0-0 xauth xvfb ca-certificates || \
          (sudo apt-get update -y && sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 libnss3 libnspr4 libasound2 libxss1 libxkbfile1 libsecret-1-0 \
            libx11-6 libx11-xcb1 libxshmfence1 libgbm1 libglib2.0-0 xauth xvfb ca-certificates)

      - name: Install additional optional GUI deps (best-effort)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install -y --no-install-recommends \
            libxrender1 libgdk-pixbuf2.0-0 libpango1.0-0 libxinerama1 libxcursor1 libxkbcommon-x11-0 \
            libwayland-client0 libwayland-cursor0 libcairo2 || true

      - name: Get VS Code version for caching
        id: vscode-version
        run: |
          # Use week-based cache key to ensure we get new VS Code versions regularly
          # while still benefiting from caching within the same week
          echo "version=stable-$(date +%Y-W%V)" >> $GITHUB_OUTPUT

      - name: Cache VS Code download
        uses: actions/cache@v4
        id: vscode-cache
        with:
          path: ~/.vscode-test
          key: vscode-${{ steps.vscode-version.outputs.version }}-${{ runner.os }}
          restore-keys: |
            vscode-stable-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Compile extension
        run: npm run compile

      - name: Run UI E2E tests (headless)
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" npm run e2e
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
          ELECTRON_ENABLE_LOGGING: '1'
          ELECTRON_IS_DEV: '1'
          # Helps Chromium when shared memory is tight
          QTWEBENGINE_DISABLE_SANDBOX: '1'
          # Set to 1 to attempt optional server-backed steps; otherwise smoke only
          E2E_WITH_SERVER: '0'
          # Enable UI E2E flows
          E2E_UI: '1'
        timeout-minutes: 10
