name: E2E (VS Code Desktop)

on:
  pull_request:
    branches: [ develop ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ develop ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Install VS Code runtime dependencies (GTK, NSS, X11, etc.)
        run: sudo apt-get update && sudo apt-get install -y \
          libgtk-3-0 libxss1 libasound2 libnss3 libxkbfile1 libx11-xcb1 libxshmfence1 libgbm1 \
          libatk-bridge2.0-0 libxcomposite1 libxrandr2 libxdamage1 libcups2 libxfixes3 libatspi2.0-0 \
          libdrm2 libdbus-1-3 libwayland-client0 libwayland-server0 libnotify4 libxext6 libxi6 libxtst6 \
          xauth xvfb fonts-liberation

      - name: Install dependencies
        run: npm ci || npm install

      - name: Compile extension
        run: npm run compile

      - name: Run E2E tests (headless)
        run: xvfb-run -a npm run e2e
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
          # Set to 1 to attempt optional server-backed steps; otherwise smoke only
          E2E_WITH_SERVER: '0'
