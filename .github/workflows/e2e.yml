name: E2E (VS Code Desktop)

on:
  pull_request:
    branches: [ develop ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ develop ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Update apt cache
        run: sudo apt-get update -y

      - name: Install VS Code runtime dependencies (GTK, NSS, X11, etc.)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get install -y --no-install-recommends \
          libgtk-3-0 libxss1 libasound2 libnss3 libnspr4 libxkbfile1 libx11-6 libx11-xcb1 libxrender1 \
          libxcomposite1 libxrandr2 libxdamage1 libxfixes3 libcups2 libatk-bridge2.0-0 libatspi2.0-0 \
          libdrm2 libdbus-1-3 libxext6 libxi6 libxtst6 libxshmfence1 libgbm1 \
          libxkbcommon0 libxkbcommon-x11-0 libxcb1 libpango1.0-0 libcairo2 libgdk-pixbuf2.0-0 \
          libxinerama1 libxcursor1 libglu1-mesa libnotify4 libwayland-client0 libwayland-cursor0 \
          libglib2.0-0 libsecret-1-0 xauth xvfb fonts-liberation ca-certificates

      - name: Install dependencies
        run: npm ci || npm install

      - name: Compile extension
        run: npm run compile

      - name: Run E2E tests (headless)
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" npm run e2e
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
          ELECTRON_ENABLE_LOGGING: '1'
          ELECTRON_IS_DEV: '1'
          # Helps Chromium when shared memory is tight
          QTWEBENGINE_DISABLE_SANDBOX: '1'
          # Set to 1 to attempt optional server-backed steps; otherwise smoke only
          E2E_WITH_SERVER: '0'
