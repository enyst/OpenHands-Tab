name: Review Thread Gate

on:
  pull_request:
    branches: [ develop ]
    types: [opened, synchronize, reopened, ready_for_review, edited]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to evaluate
        required: true
        type: number

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: review-thread-gate-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.sha }}
  cancel-in-progress: true

jobs:
  unresolved-review-threads:
    runs-on: ubuntu-latest
    steps:
      - name: Fail when unresolved review threads remain (unless waived)
        uses: actions/github-script@v8
        with:
          script: |
            const payloadPrNumber = context.payload.pull_request?.number;
            const dispatchPrNumber = Number.parseInt(String(context.payload.inputs?.pr_number ?? ''), 10);
            const prNumber = payloadPrNumber ?? (Number.isFinite(dispatchPrNumber) ? dispatchPrNumber : null);
            if (!prNumber) {
              core.setFailed('No pull request number found in event payload. For workflow_dispatch, provide pr_number.');
              return;
            }

            const metadataQuery = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    baseRefName
                    body
                  }
                }
              }
            `;
            const metadataResult = await github.graphql(metadataQuery, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: prNumber,
            });
            const pullRequest = metadataResult.repository.pullRequest;
            if (!pullRequest) {
              core.setFailed(`Pull request #${prNumber} was not found.`);
              return;
            }
            if (pullRequest.baseRefName !== 'develop') {
              core.info(`Skipping pull request #${prNumber} because base branch is '${pullRequest.baseRefName}', not 'develop'.`);
              return;
            }

            const waiverMatch = pullRequest.body?.match(/review-thread-waiver\s*:\s*(.+)/i);
            const waiverReason = waiverMatch?.[1]?.trim() ?? null;

            const unresolved = [];
            let cursor = null;
            do {
              const query = `
                query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100, after: $cursor) {
                        nodes {
                          id
                          isResolved
                          isOutdated
                          comments(first: 1) {
                            nodes {
                              author { login }
                              path
                              line
                              url
                            }
                          }
                        }
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }
                }
              `;
              const result = await github.graphql(query, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                number: prNumber,
                cursor,
              });

              const pagedPullRequest = result.repository?.pullRequest;
              if (!pagedPullRequest) {
                core.setFailed(
                  `Pull request #${prNumber} became unavailable while reading review threads. ` +
                  'Re-run the workflow if the PR still exists.',
                );
                return;
              }

              const page = pagedPullRequest.reviewThreads;
              for (const thread of page.nodes) {
                if (thread.isResolved) continue;
                const firstComment = thread.comments.nodes[0];
                unresolved.push({
                  url: firstComment?.url ?? '(no-url)',
                  author: firstComment?.author?.login ?? 'unknown',
                  path: firstComment?.path ?? 'unknown',
                  line: firstComment?.line ?? '?',
                  outdated: thread.isOutdated,
                });
              }

              cursor = page.pageInfo.hasNextPage ? page.pageInfo.endCursor : null;
            } while (cursor);

            if (unresolved.length === 0) {
              core.info('No unresolved review threads found.');
              return;
            }

            const summaryLines = unresolved.map(
              (thread) =>
                `- ${thread.url} (author: ${thread.author}, file: ${thread.path}:${thread.line}, outdated: ${thread.outdated})`,
            );
            await core.summary
              .addHeading(`Unresolved review threads: ${unresolved.length}`)
              .addRaw(summaryLines.join('\n'))
              .write();

            if (waiverReason) {
              core.warning(
                `Unresolved review threads remain (${unresolved.length}), but waiver provided: ${waiverReason}`,
              );
              return;
            }

            core.setFailed(
              `Found ${unresolved.length} unresolved review thread(s). Resolve all threads or add ` +
              '`review-thread-waiver: <reason>` to the PR body for an intentional waiver.',
            );
