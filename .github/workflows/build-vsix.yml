name: Build VSIX (PRs and develop)

on:
  pull_request:
    branches: [ develop ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ develop ]
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

concurrency:
  group: build-vsix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.vsix_name }}
          path: ./
          merge-multiple: true

      - name: Create Release with VSIX asset
        uses: ncipollo/release-action@v1.16.0
        with:
          artifacts: "*.vsix"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          allowUpdates: true

  build:
    runs-on: ubuntu-latest
    outputs:
      vsix_name: ${{ steps.package.outputs.vsix_name }}
      vsix_file: ${{ steps.package.outputs.vsix_file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)." >&2
            exit 1
          fi

      - name: Build everything (SDK + extension + webview)
        run: npm run build

      - name: Type check (webview + extension)
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Package VSIX
        id: package
        run: |
          npm run package -- --no-yarn --allow-missing-repository --allow-star-activation
          VSIX_FILE=$(ls -1 *.vsix | head -n1)
          echo "vsix_file=$VSIX_FILE" >> $GITHUB_OUTPUT
          echo "vsix_name=$(basename "$VSIX_FILE")" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.vsix_name }}
          path: ${{ steps.package.outputs.vsix_file }}
          if-no-files-found: error
          retention-days: 7

      - name: Comment on PR with artifact link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const vsixName = `${{ toJson(steps.package.outputs.vsix_name) }}`.replaceAll('"','').trim();
            const sizeBytes = require('fs').statSync(vsixName).size;
            const sizeKB = Math.round(sizeBytes / 1024);

            const body = `## 🔧 VSCode Extension Built Successfully

            • File: ${vsixName} (${sizeKB} KB)
            • Download: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            To install:
            1. Download the artifact from the run page above
            2. VS Code → Command Palette → "Extensions: Install from VSIX..."
            3. Select the downloaded .vsix

            Built with Node 22. Commit ${{ github.sha }}.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // Remove previous bot comment for noise reduction
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const prev = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('VSCode Extension Built Successfully'));
            if (prev) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: prev.id });
            }

            await github.rest.issues.createComment({ owner, repo, issue_number, body });
