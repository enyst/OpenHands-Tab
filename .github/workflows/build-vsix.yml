name: Build VSIX (PRs and develop)

on:
  pull_request:
    branches: [ develop ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ develop ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pull-requests: write

concurrency:
  group: build-vsix-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        id: package
        run: |
          npx vsce package --no-yarn --allow-missing-repository
          VSIX_FILE=$(ls -1 *.vsix | head -n1)
          echo "vsix_file=$VSIX_FILE" >> $GITHUB_OUTPUT
          echo "vsix_name=$(basename "$VSIX_FILE")" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.vsix_name }}
          path: ${{ steps.package.outputs.vsix_file }}
          if-no-files-found: error

      - name: Upload VSIX to draft release (PRs)
        if: github.event_name == 'pull_request'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.package.outputs.vsix_file }}
          asset_name: ${{ steps.package.outputs.vsix_name }}
          tag: pr-${{ github.event.pull_request.number }}
          release_name: "PR #${{ github.event.pull_request.number }} VSIX"
          body: "Automated build for PR #${{ github.event.pull_request.number }} (commit ${{ github.sha }})"
          draft: true
          prerelease: true
          overwrite: true

      - name: Find artifact id via API
        id: find
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.runId;
            const {owner, repo} = context.repo;
            const { data } = await github.request('GET /repos/{owner}/{repo}/actions/runs/{run_id}/artifacts', { owner, repo, run_id });
            const targetName = `${{ toJson(steps.package.outputs.vsix_name) }}`.replaceAll('"','').trim();
            const match = data.artifacts.find(a => a.name === targetName) || data.artifacts[0];
            core.setOutput('artifact_id', match ? String(match.id) : '');
            core.setOutput('artifact_name', match ? match.name : '');

      - name: Comment with artifact link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vsix-artifact
          message: |
            ✅ VSIX package is ready for this PR.

            - File: `${{ steps.package.outputs.vsix_name }}`
            - Direct download (release asset): https://github.com/${{ github.repository }}/releases/tag/pr-${{ github.event.pull_request.number }}
            - Actions run page: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
